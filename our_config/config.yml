saveIntervalSeconds: 60 * 15
topListUpdateIntervalSeconds: 10
maxTopListSize: 100
topListCommandsPageSize: 10
incrementIntervalTicks: 10
calendarBucketKeyUpdateIntervalSeconds: 5
timeZoneId: 'Europe/Berlin'
ranks:
  siedler:
    requiredPlayTime: 1d
    notification:
      self:
        title: '{lut.rank_prefix.siedler}'
        subtitle: '<&a>Rang erhalten!'
      broadcast:
        chat: '<$lut.uprank_broadcast [rank-prefix]="lut.rank_prefix.siedler" />'
    icon:
      slot: 28
      pending:
        type: STONE_BRICKS
        name: '<reset><&8>» {lut.rank_prefix.siedler} <&8>«'
        lore: '<reset><$lut.rank_description.siedler pending>'
      claimed:
        type: STONE_BRICKS
        name: '<reset><&8>» {lut.rank_prefix.siedler} <&8>«'
        lore: '<reset><$lut.rank_description.siedler>'
  buerger:
    requiredPlayTime: 12d
    notification:
      self:
        title: '{lut.rank_prefix.buerger}'
        subtitle: '<&a>Rang erhalten!'
      broadcast:
        chat: '<$lut.uprank_broadcast [rank-prefix]="lut.rank_prefix.buerger" />'
    icon:
      slot: 29
      pending:
        type: BEACON
        name: '<reset><&8>» {lut.rank_prefix.buerger} <&8>«'
        lore: '<reset><$lut.rank_description.buerger pending>'
      claimed:
        type: BEACON
        name: '<reset><&8>» {lut.rank_prefix.buerger} <&8>«'
        lore: '<reset><$lut.rank_description.buerger>'
  aristokrat:
    requiredPlayTime: 25d
    notification:
      self:
        title: '{lut.rank_prefix.aristokrat}'
        subtitle: '<&a>Rang erhalten!'
      broadcast:
        chat: '<$lut.uprank_broadcast [rank-prefix]="lut.rank_prefix.aristokrat" />'
    icon:
      slot: 30
      pending:
        type: GOLD_BLOCK
        name: '<reset><&8>» {lut.rank_prefix.aristokrat} <&8>«'
        lore: '<reset><$lut.rank_description.aristokrat pending>'
      claimed:
        type: GOLD_BLOCK
        name: '<reset><&8>» {lut.rank_prefix.aristokrat} <&8>«'
        lore: '<reset><$lut.rank_description.aristokrat>'
commands:
  playTop:
    name: playtop
    playTopScreen: |
      <&8><&m>{' ' ** 20}</> <&6>Top Spielzeit<&8> <&8><&m>{' ' ** 20}</><br/>
      <&7>{top_type}, Seite {current_page}/{number_of_pages} ({page_size}/Seite)<br/>
      <br/>
      <container *for-entry="entries" *for-separator={<br/>}>
        <&7>#{entry.place} <&e>{entry.name} <&6><$lut.time_format [time]="entry.time" />
      </container>
      <br/>
  afkTop:
    name: afktop
    afkTopScreen: |
      <&8><&m>{' ' ** 20}</> <&6>Top AFK-Zeit<&8> <&8><&m>{' ' ** 20}</><br/>
      <&7>{top_type}, Seite {current_page}/{number_of_pages} ({page_size}/Seite)<br/>
      <br/>
      <container *for-entry="entries" *for-separator={<br/>}>
        <&7>#{entry.place} <&e>{entry.name} <&6><$lut.time_format [time]="entry.time" />
      </container>
      <br/>
  playtime:
    name: playtime
    consoleExecutionWithoutName: '{lut.prefix} <&c>Bei Ausführung in der Konsole ist ein Spielername verpflichtend!'
    commandUsage: '{lut.prefix} <&c>Benutzung: /{label} [Spieler]'
    playtimeOfSelf: |
      {lut.prefix} <&7>Du hast <&6><$lut.time_format [time]="play_time" /> <&7>aktiv gespielt und warst <&6><$lut.time_format [time]="afk_time" /> <&7>AFK.
    playtimeOfOther: |
      {lut.prefix} <&e>{player_name} <&7>hat <&6><$lut.time_format [time]="play_time" /> <&7>aktiv gespielt und war <&6><$lut.time_format [time]="afk_time" /> <&7>AFK.
  rewards:
    name: rewards
  main:
    name: playtimerankup
    commandUsage: '{lut.prefix} <&c>Benutzung: /{label} \<<&4 *for-action="actions" *for-separator={,<space/>}>{action}</>>'
    reloadedSuccessfully: '{lut.prefix} <&7>Die Konfiguration wurde erfolgreich <&a>neu geladen<&7>.'
    errorWhileReloading: '{lut.prefix} <&c>Es trat ein Fehler auf, während die Konfiguration neu geladen wurde; siehe Konsole!'
commonMessages:
  onlyAvailableToPlayers: '{lut.prefix} <&c>Dieser Befehl ist nur für Spieler verfügbar!'
  hasNotPlayedBefore: '{lut.prefix} <&c>Der Spieler <&4>{name} <&c>hat noch nicht zuvor gespielt!'
  topCommandUsage: '{lut.prefix} <&c>Benutzung: /{label} [<container *for-type="types" *for-separator={,<space/>}>{type}</>] [Seite]'
  topCommandInvalidPage: '{lut.prefix} <&c>Ungültige Seitenzahl: <&4>{input}<&c>!'
  topCommandEmptyTopList: '{lut.prefix} <&c>Die Topliste hat noch keine Einträge!'
  topCommandExceededPages: '{lut.prefix} <&c>Die Seitenzahl <&4>{page} <&c>überschreitet die Gesamtanzahl von <&4>{number_of_pages} Seiten<&c>!'
topListType:
  displayNames:
    GLOBAL: 'Gesamt'
    DAY: 'Tag'
    WEEK: 'Woche'
    MONTH: 'Monat'
    YEAR: 'Jahr'
rewardsDisplay:
  title: '<&8>{player_name}''s Belohnungen'
  rows: 5
  items:
    statistics:
      type: OAK_HANGING_SIGN
      slots: 13
      name: |
        <reset>
          <&8>» <&6>Statistiken <&8>«
      lore: |
        <reset>
          <br/>
          <&9>Gesamtzeit<br/>
          <&8>➥ <&e>Aktiv <&6><$lut.time_format [time]="play_time" /> <&7>(#{play_time_global_top_place})<br/>
          <&8>➥ <&e>AFK <&6><$lut.time_format [time]="afk_time" /> <&7>(#{afk_time_global_top_place})<br/>
          <br/>
          <&9>Dieser Tag <&7>(<$lut.date_now format="EEE" />)<br/>
          <&8>➥ <&e>Aktiv <&6><$lut.time_format [time]="play_time_day" /> <&7>(#{play_time_day_top_place})<br/>
          <&8>➥ <&e>AFK <&6><$lut.time_format [time]="afk_time_day" /> <&7>(#{afk_time_day_top_place})<br/>
          <br/>
          <&9>Diese Woche <&7>(<$lut.date_now format="YYYY-'W'ww" />)<br/>
          <&8>➥ <&e>Aktiv <&6><$lut.time_format [time]="play_time_week" /> <&7>(#{play_time_week_top_place})<br/>
          <&8>➥ <&e>AFK <&6><$lut.time_format [time]="afk_time_week" /> <&7>(#{afk_time_week_top_place})<br/>
          <br/>
          <&9>Diesen Monat <&7>(<$lut.date_now format="MMM" />)<br/>
          <&8>➥ <&e>Aktiv <&6><$lut.time_format [time]="play_time_month" /> <&7>(#{play_time_month_top_place})<br/>
          <&8>➥ <&e>AFK <&6><$lut.time_format [time]="afk_time_month" /> <&7>(#{afk_time_month_top_place})<br/>
          <br/>
          <&9>Dieses Jahr <&7>(<$lut.date_now format="yyyy" />)<br/>
          <&8>➥ <&e>Aktiv <&6><$lut.time_format [time]="play_time_year" /> <&7>(#{play_time_year_top_place})<br/>
          <&8>➥ <&e>AFK <&6><$lut.time_format [time]="afk_time_year" /> <&7>(#{afk_time_year_top_place})<br/>
    filler:
      type: BLACK_STAINED_GLASS_PANE
      name: ' '
      slots: '(0..last_slot) - (28..34)'

sLut:
cLut:
  prefix: '<&7>[<&6>Spielzeit<&7>]'
  time_format: |
    <container *if="time < 20">0s</>
    <duration *else [value]="time / 20.0 * 1000.0" units="smhd" />
  date_now: '<date [format] locale="de" />'
  uprank_broadcast: '{lut.prefix} <&7>Der Spieler <&a>{player_name} <&7>hat den {rank_prefix}-Rang nach Erreichen einer Spielzeit von <&a><$lut.time_format [time]="required_time" /> <&7>erhalten!'
  required_time_section: |
    <&d>Benötigte Spielzeit: <&e><$lut.time_format [time]="required_time" />, ohne AFK-Zeit!<br/>
    <br/>
  remaining_time_section: |
    <br/><br/>
    <container *if="has('pending')">
      <&d>Zeit bis zum Aufstieg: <&e><$lut.time_format [time]="remaining_time" />
    </container>
    <container *else>
      <&a>Bereits erhalten!
    </container>
  rank_prefix:
    entdecker: '<gradient c="#C4E90D" c="#08B629">[Entdecker]'
    siedler: '<gradient c="#0ECCFF" c="#006DFD">[Siedler]'
    buerger: '<gradient c="#BE1EFF" c="#09C872">[Bürger]'
    aristokrat: '<gradient c="#CDB305" c="#F1FD0C">[Aristokrat]'
  rank_description:
    siedler: |
      {lut.required_time_section}
      <&a><&l>Vorteile:</><br/>
      <#9BCD9B><&o>Alles, was {lut.rank_prefix.entdecker} auch können, sowie:</&o><br/>
      <#C1FFC1>
        20 Homepunkte<br/>
        2 ImageFrames Bilder<br/>
        Pipes + PipePredicates<br/>
        Painting-Switcher<br/>
        Hidden-Switch<br/>
        Sign-Copier + SignEdit<br/>
        Zugriff aufs Kopfplugin mit <#9370db>/hdb</><br/>
        Lava-Schwämme (nasse Schwämme saugen Lava statt Wasser)<br/>
        MultiBreak (Abbauradius max. 2x2x2)<br/>
        Private virtuelle Truhe mit <#9370db>/pv</> mit 27 Slots<br/>
        Uncraft von Sachen mit <#9370db>/uc</><br/>
        Inventarfilter beim Aufsammeln mit <#9370db>/invfilter</> \<item/variable>
      </#C1FFC1>
      {lut.remaining_time_section}
    buerger: |
      {lut.required_time_section}
      <&a><&l>Vorteile:</><br/>
      <#9BCD9B><&o>Alles, was {lut.rank_prefix.siedler} auch können, sowie:</&o><br/>
      <#C1FFC1>
        50 Homepunkte<br/>
        5 ImageFrames Bilder<br/>
        Teleporter<br/>
        Lift-Schilder<br/>
        Edit-Armorstands (EAS)<br/>
        /nick (Nicknamen setzen)<br/>
        /anvil (Mobiler Amboss)<br/>
        Item-Name auf das in der Hand gehaltene mit <#9370db>/itemname \<name></><br/>
        MultiBreak (Abbauradius max. 3x3x3)<br/>
        Private virtuelle Truhe mit <#9370db>/pv</> mit 36 Slots<br/>
        Spielerzeit einstellbar mit <#9370db>/ptime \<Zeit></> in der Bauwelt<br/>
        Uncraft von allem mit <#9370db>/uc -a</>
      </#C1FFC1>
      {lut.remaining_time_section}
    aristokrat: |
      {lut.required_time_section}
      <&a><&l>Vorteile:</><br/>
      <#9BCD9B><&o>Alles, was {lut.rank_prefix.buerger} auch können, sowie:</&o><br/>
      <#C1FFC1>
        100 Homepunkte<br/>
        7 ImageFrames Bilder<br/>
        Auto-Planter<br/>
        Auto-Crafter<br/>
        Transmitter/Receiver<br/>
        MultiBreak (Abbauradius max. 4x4x4)<br/>
        Private virtuelle Truhe mit <#9370db>/pv</> mit 45 Slots
      </#C1FFC1>
      {lut.remaining_time_section}